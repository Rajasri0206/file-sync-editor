kind = "web"
previewPath = "/"
title = "EchoCoach"
version = "1.0.0"
id = "artifacts/speaking-coach"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24049

[services.development]
run = "pnpm --filter @workspace/speaking-coach run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/speaking-coach", "run", "build" ]
publicDir = "artifacts/speaking-coach/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24049"
BASE_PATH = "/"
